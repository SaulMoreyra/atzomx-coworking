services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: atzomx
      POSTGRES_PASSWORD: atzomx
      POSTGRES_DB: atzomx
    volumes:
      - atzomx_pg_data:/var/lib/postgresql/data

volumes:
  atzomx_pg_data:
